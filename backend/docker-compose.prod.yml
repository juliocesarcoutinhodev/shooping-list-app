services:
  app:
    image: ${APP_IMAGE}
    container_name: shopping-list-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      SERVER_PORT: 8080
      PROFILE: prod
    expose:
      - "8080"
    networks:
      - edge
      - app_internal

  mysql:
    image: mysql:8.4
    container_name: shopping-list-mysql
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_internal

networks:
  edge:
    external: true
    name: infra_app-network
  app_internal:
    driver: bridge

volumes:
  mysql-data:

