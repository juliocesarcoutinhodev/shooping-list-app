name: Deploy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: shopping-list-api
  APP_DIR: /home/topone/shopping-list-api
  IMAGE_NAME: shopping-list-api
  VPS_HOST: vps7348.integrator.host
  VPS_USER: topone
  VPS_PORT: "22"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=ghcr.io/${OWNER_LOWER}/${IMAGE_LOWER}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required deploy inputs
        env:
          VPS_HOST: ${{ env.VPS_HOST }}
          VPS_USER: ${{ env.VPS_USER }}
          VPS_PORT: ${{ env.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || (echo "Missing VPS_HOST (configure secret or variable)." && exit 1)
          test -n "$VPS_USER" || (echo "Missing VPS_USER (configure secret or variable)." && exit 1)
          test -n "$VPS_PORT" || (echo "Missing VPS_PORT (configure secret or variable)." && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "Missing VPS_SSH_KEY secret." && exit 1)
          test -n "$GHCR_USERNAME" || (echo "Missing GHCR_USERNAME secret." && exit 1)
          test -n "$GHCR_TOKEN" || (echo "Missing GHCR_TOKEN secret." && exit 1)

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}

      - name: Ensure app directory exists on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          envs: APP_NAME,APP_DIR
          script: |
            set -e
            mkdir -p "${APP_DIR}"

      - name: Upload compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          source: backend/docker-compose.prod.yml
          target: ${{ env.APP_DIR }}/
          strip_components: 1

      - name: Render .env.production on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          envs: APP_NAME,APP_DIR,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,JWT_SECRET,JWT_ISSUER,GOOGLE_CLIENT_ID,COOKIE_DOMAIN
          script: |
            set -e
            cd "${APP_DIR}"
            {
              printf 'APP_NAME=%s\n' "${APP_NAME}"
              printf 'PROFILE=prod\n'
              printf 'SERVER_PORT=8080\n'
              printf 'MYSQL_HOST=mysql\n'
              printf 'MYSQL_PORT=3306\n'
              printf 'MYSQL_ROOT_PASSWORD=%s\n' "${MYSQL_ROOT_PASSWORD}"
              printf 'MYSQL_DATABASE=%s\n' "${MYSQL_DATABASE}"
              printf 'MYSQL_USER=%s\n' "${MYSQL_USER}"
              printf 'MYSQL_PASSWORD=%s\n' "${MYSQL_PASSWORD}"
              printf 'JWT_SECRET=%s\n' "${JWT_SECRET}"
              printf 'JWT_ISSUER=%s\n' "${JWT_ISSUER}"
              printf 'GOOGLE_CLIENT_ID=%s\n' "${GOOGLE_CLIENT_ID}"
              printf 'COOKIE_DOMAIN=%s\n' "${COOKIE_DOMAIN}"
            } > .env.production
            chmod 600 .env.production

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          COMMIT_SHA: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          envs: APP_NAME,APP_DIR,IMAGE_REPO,COMMIT_SHA,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "${APP_DIR}"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            APP_IMAGE=${IMAGE_REPO}:${COMMIT_SHA} docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker image prune -f --filter "until=168h" || true
